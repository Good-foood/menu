<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Замовлення обідів</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #F5F4F0;
    color: #1a1a1a;
    min-height: 100vh;
  }

  header {
    background: #fff;
    border-bottom: 1px solid #E8E6E0;
    padding: 16px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #1a1a1a;
  }

  header p {
    font-size: 13px;
    color: #888;
    margin-top: 2px;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 20px 16px 120px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #999;
    margin: 24px 0 10px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 8px;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  input[type="text"], input[type="tel"] {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #E0DDD7;
    border-radius: 12px;
    font-size: 15px;
    background: #fff;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus, input[type="tel"]:focus {
    border-color: #1D9E75;
  }

  input::placeholder { color: #bbb; }

  .menu-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .dish-card {
    background: #fff;
    border-radius: 16px;
    border: 1.5px solid #E8E6E0;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s;
  }

  .dish-card.active {
    border-color: #1D9E75;
  }

  .dish-photo {
    width: 70px;
    height: 70px;
    border-radius: 10px;
    object-fit: cover;
    background: #F0EEE8;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
  }

  .dish-photo img {
    width: 100%;
    height: 100%;
    border-radius: 10px;
    object-fit: cover;
  }

  .dish-info {
    flex: 1;
    min-width: 0;
  }

  .dish-name {
    font-size: 15px;
    font-weight: 500;
    color: #1a1a1a;
    line-height: 1.3;
  }

  .dish-meta {
    font-size: 12px;
    color: #aaa;
    margin-top: 3px;
  }

  .dish-price {
    font-size: 14px;
    font-weight: 600;
    color: #1D9E75;
    margin-top: 4px;
  }

  .qty-control {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .qty-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1.5px solid #E0DDD7;
    background: #F5F4F0;
    color: #1a1a1a;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.1s, border-color 0.1s;
    user-select: none;
  }

  .qty-btn:hover { background: #ECEAE4; border-color: #ccc; }
  .qty-btn.plus { border-color: #1D9E75; color: #1D9E75; background: #E8F7F1; }
  .qty-btn.plus:hover { background: #D4EFE5; }

  .qty-num {
    font-size: 17px;
    font-weight: 600;
    min-width: 22px;
    text-align: center;
    color: #1a1a1a;
  }

  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid #E8E6E0;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    z-index: 10;
  }

  .total-info {
    display: flex;
    flex-direction: column;
  }

  .total-label {
    font-size: 12px;
    color: #999;
  }

  .total-value {
    font-size: 20px;
    font-weight: 700;
    color: #1a1a1a;
  }

  .total-value span {
    font-size: 13px;
    font-weight: 400;
    color: #888;
    margin-left: 4px;
  }

  .order-btn {
    flex: 1;
    max-width: 260px;
    padding: 14px;
    background: #1D9E75;
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }

  .order-btn:hover { background: #178a64; }
  .order-btn:disabled { background: #D0D0CC; color: #aaa; cursor: default; }

  .toast {
    display: none;
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    color: #fff;
    padding: 12px 22px;
    border-radius: 99px;
    font-size: 14px;
    font-weight: 500;
    z-index: 100;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  .error-toast {
    background: #e24b4a;
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: -3px;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 420px) {
    .field-row { grid-template-columns: 1fr; }
    .dish-photo { width: 60px; height: 60px; }
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<header>
  <h1>🍽 Замовлення обідів</h1>
  <p id="dateLabel"></p>
</header>

<div class="container">

  <p class="section-title">Ваші дані</p>
  <div class="field-group">
    <div class="field-row">
      <input type="text" id="clientName" placeholder="Ім'я" />
      <input type="tel" id="clientPhone" placeholder="Телефон" />
    </div>
    <input type="text" id="clientAddress" placeholder="Адреса доставки (вул., будинок, кв.)" />
  </div>

  <p class="section-title">Меню на завтра</p>
  <div class="menu-list" id="menuList"></div>

</div>

<div class="bottom-bar">
  <div class="total-info">
    <span class="total-label">Позицій</span>
    <div class="total-value" id="totalCount">0 <span>шт</span></div>
  </div>
  <button class="order-btn" id="orderBtn" onclick="submitOrder()" disabled>Замовити</button>
</div>

<script>
  // ─── НАЛАШТУВАННЯ ───────────────────────────────────────────
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxoN3L2EVIR9wW69Nx7ZJDhoajPy4glkFwzLsHhsOZLmN4gnIpaLLKKoalGKvt3UyawDQ/exec";

  // ЩОБ ЗМІНИТИ МЕНЮ — просто редагуй цей список:
  // emoji або url картинки в полі "photo"
  const DISHES = [
    { id: 1, name: "Свинина з картоплею",   weight: "350г", price: "95 грн", photo: "🥩" },
    { id: 2, name: "Курка гриль з рисом",   weight: "320г", price: "85 грн", photo: "🍗" },
    { id: 3, name: "Салат Цезар з куркою",  weight: "250г", price: "75 грн", photo: "🥗" },
    { id: 4, name: "Борщ + пампушки",       weight: "400г", price: "60 грн", photo: "🍲" },
  ];
  // ────────────────────────────────────────────────────────────

  const qty = {};
  DISHES.forEach(d => qty[d.id] = 0);

  function tomorrow() {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    return d.toLocaleDateString("uk-UA", { weekday: "long", day: "numeric", month: "long" });
  }

  document.getElementById("dateLabel").textContent = "на " + tomorrow();

  function renderMenu() {
    const list = document.getElementById("menuList");
    list.innerHTML = DISHES.map(d => {
      const isUrl = d.photo.startsWith("http") || d.photo.startsWith("/");
      const photoHtml = isUrl
        ? `<div class="dish-photo"><img src="${d.photo}" alt="${d.name}" /></div>`
        : `<div class="dish-photo">${d.photo}</div>`;
      return `
        <div class="dish-card" id="card-${d.id}">
          ${photoHtml}
          <div class="dish-info">
            <div class="dish-name">${d.name}</div>
            <div class="dish-meta">${d.weight}</div>
            <div class="dish-price">${d.price}</div>
          </div>
          <div class="qty-control">
            <button class="qty-btn" onclick="change(${d.id}, -1)" aria-label="Менше">−</button>
            <span class="qty-num" id="qty-${d.id}">0</span>
            <button class="qty-btn plus" onclick="change(${d.id}, 1)" aria-label="Більше">+</button>
          </div>
        </div>`;
    }).join("");
  }

  function change(id, delta) {
    qty[id] = Math.max(0, qty[id] + delta);
    document.getElementById("qty-" + id).textContent = qty[id];
    document.getElementById("card-" + id).classList.toggle("active", qty[id] > 0);
    updateSummary();
  }

  function updateSummary() {
    const total = Object.values(qty).reduce((s, v) => s + v, 0);
    document.getElementById("totalCount").innerHTML = total + ' <span>шт</span>';
    const name = document.getElementById("clientName").value.trim();
    const address = document.getElementById("clientAddress").value.trim();
    document.getElementById("orderBtn").disabled = total === 0 || !name || !address;
  }

  ["clientName", "clientPhone", "clientAddress"].forEach(id =>
    document.getElementById(id).addEventListener("input", updateSummary)
  );

  function showToast(msg, isError) {
    const t = document.getElementById("toast");
    t.className = "toast" + (isError ? " error-toast" : "");
    t.innerHTML = msg;
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 3500);
  }

  async function submitOrder() {
    const btn = document.getElementById("orderBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Відправляємо...';

    const payload = {
      name:    document.getElementById("clientName").value.trim(),
      phone:   document.getElementById("clientPhone").value.trim(),
      address: document.getElementById("clientAddress").value.trim(),
      dishes:  DISHES.map(d => ({ name: d.name, qty: qty[d.id] }))
    };

    try {
      const formData = new FormData();
      formData.append("data", JSON.stringify(payload));
      await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        body: formData
      });

      showToast("✓ Замовлення прийнято! Чекайте доставки 🎉");
      DISHES.forEach(d => { qty[d.id] = 0; });
      document.getElementById("clientName").value = "";
      document.getElementById("clientPhone").value = "";
      document.getElementById("clientAddress").value = "";
      renderMenu();
      updateSummary();

    } catch (err) {
      showToast("Помилка. Перевірте інтернет і спробуйте ще раз.", true);
      updateSummary();
    }
  }

  renderMenu();
</script>
</body>
</html>
